<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Nexo | Axioma Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login-style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-left" style="background-image: url('https://axiomaanalytics.com/wp-content/uploads/2025/12/Axiomaanalytics_puerto2.jpg');">
            <div class="overlay">
                <h1>NEXO</h1>
                <p>"Sistema integral que simplifica la gestión de tu negocio"</p>
            </div>
        </div>

        <div class="login-right">
            <h2>Bienvenido a Nexo</h2>
            <p>Ingresa tus credenciales para continuar</p>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Ingresa tu usuario (correo)" required>
                <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                <button type="submit">Iniciar Sesión</button>
            </form>
            <p style="margin-top: 20px; font-size: 0.9em; color: #666;">¿Olvidaste tu contraseña?</p>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
